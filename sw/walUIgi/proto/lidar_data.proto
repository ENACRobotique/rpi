syntax = "proto3";

package enac;

message Lidar {
    int32 nb_pts = 1;
    float angle_increment = 2;
    repeated float angles = 3; // radians in [0, 6.28] trigonometric/anticlockwise, starting from origin of lidar
    repeated float distances = 4; // millimeters 
    repeated float quality = 5; 
}

enum ProximityStatus { 
    OK = 0;
    WARNING = 1;
    STOP = 2;
}

message Proximity { 
    float closest_distance = 1;
    ProximityStatus status = 2;
}

message Amalgames {
    // position in lidar frame
    repeated float x = 1;
    repeated float y = 2;
    repeated float size = 3;
}

message Balises {
    // beacon position calculated based on the robot's odometry
    repeated int32 index = 1;
    repeated float x = 2;
    repeated float y = 3;
}
